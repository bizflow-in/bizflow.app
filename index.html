<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BizFlow — Business OS for MSMEs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#16a34a;--green-dark:#15803d;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --yellow:#d97706;--yellow-light:#fef3c7;
  --blue:#2563eb;--blue-light:#dbeafe;
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
  --border:#e2e8f0;--text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --primary:#16a34a;--primary-dark:#15803d;
  --radius:12px;--shadow:0 1px 8px rgba(0,0,0,0.08);--shadow-lg:0 4px 24px rgba(0,0,0,0.12);
  --sidebar:260px;--topbar:60px;
}
[data-theme=dark]{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273449;
  --border:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --shadow:0 1px 8px rgba(0,0,0,0.3);--shadow-lg:0 4px 24px rgba(0,0,0,0.5);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ─── AUTH ─────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#dcfce7);padding:20px}
.auth-box{background:var(--surface);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:52px;height:52px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:800;margin-bottom:10px}
.auth-logo h1{font-size:26px;font-weight:800;color:var(--text)}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px}
.auth-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--text2);border-radius:8px;transition:.15s}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:var(--surface);transition:.15s;min-height:44px}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,0.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;transition:.15s;min-height:44px;white-space:nowrap}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}
.btn-full{width:100%}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:7px 14px;font-size:13px;min-height:34px}
.btn-danger{background:var(--red);color:white}
.btn-wa{background:#25D366;color:white}
.btn-wa:hover{background:#1da851}
.btn-ghost{background:transparent;color:var(--text2);border:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:13px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;padding:11px 18px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;transition:.15s;min-height:44px}
.google-btn:hover{background:var(--border)}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch span{color:var(--primary);cursor:pointer;font-weight:600}

/* ─── NICHE ─────────────────────────────── */
.niche-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.niche-box{max-width:600px;width:100%;text-align:center}
.niche-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}
.niche-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px 8px;cursor:pointer;transition:.15s}
.niche-card:hover{border-color:var(--primary)}
.niche-card.selected{border-color:var(--primary);background:var(--green-light)}
.niche-emoji{font-size:26px;margin-bottom:6px}
.niche-label{font-size:11px;font-weight:600;color:var(--text2)}

/* ─── LAYOUT ─────────────────────────────── */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:.3s}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
.topbar{height:var(--topbar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50}
.page{padding:24px;max-width:1100px;flex:1}

/* ─── SIDEBAR ─────────────────────────────── */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--primary);border-radius:9px;display:grid;place-items:center;color:white;font-weight:800;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-size:18px;font-weight:800}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:10px 8px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;font-size:14px;font-weight:500;color:var(--text2);background:transparent;border:none;width:100%;text-align:left;transition:.12s;margin-bottom:1px}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--primary);color:white}
.nav-btn svg{width:17px;height:17px;flex-shrink:0;opacity:.7}
.nav-btn.active svg{opacity:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}

/* ─── TOPBAR ─────────────────────────────── */
.topbar-title{font-size:18px;font-weight:700;flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;color:var(--text2);cursor:pointer;transition:.12s;flex-shrink:0}
.icon-btn:hover{background:var(--border)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);color:white;display:grid;place-items:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0}
.lang-wrap{position:relative}
.lang-drop{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:8px;min-width:180px;z-index:200;max-height:280px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:3px}
.lang-opt{padding:7px 9px;border-radius:7px;font-size:12px;cursor:pointer;transition:.1s}
.lang-opt:hover{background:var(--surface2)}
.lang-opt.active{background:var(--primary);color:white}

/* ─── PAGE HEADER ─────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px}

/* ─── STATS ─────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.stat-val{font-size:24px;font-weight:800;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text2);margin-top:3px}
.stat-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px}
.tag-up{background:var(--green-light);color:var(--green-dark)}
.tag-down{background:var(--red-light);color:var(--red)}

/* ─── FLOW CARDS ─────────────────────────── */
.flow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.flow-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.flow-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.flow-in::before{background:var(--green)}
.flow-out::before{background:var(--red)}
.flow-net::before{background:var(--yellow)}
.flow-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.flow-val{font-size:26px;font-weight:800}

/* ─── CARD ─────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:14px}

/* ─── TABLE ─────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--surface2)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}

/* ─── BADGE ─────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-success{background:var(--green-light);color:var(--green-dark)}
.badge-warning{background:var(--yellow-light);color:var(--yellow)}
.badge-danger{background:var(--red-light);color:var(--red)}
.badge-info{background:var(--blue-light);color:var(--blue)}
.badge-neutral{background:var(--surface2);color:var(--text2)}

/* ─── MODAL ─────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s}
.modal{background:var(--surface);border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s}
.modal-lg{max-width:720px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;line-height:1;padding:4px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ─── TOAST ─────────────────────────────── */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:260px;animation:slideUp .2s}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--blue)}

/* ─── FORMS ─────────────────────────────── */
.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--surface);min-height:44px;transition:.15s}
.form-select:focus{outline:none;border-color:var(--primary)}
.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--surface);resize:vertical;min-height:80px}
.form-textarea:focus{outline:none;border-color:var(--primary)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap2{gap:8px}.gap3{gap:12px}
.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--text2)}.font-bold{font-weight:700}
.text-green{color:var(--green)}.text-red{color:var(--red)}
.hidden{display:none!important}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:4px;width:80px}
.progress-fill{height:100%;border-radius:4px}
.mobile-menu-btn{display:none}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none}
.overlay-bg.show{display:block}

/* ─── STEPS ─────────────────────────────── */
.step-list{}
.step-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-num{width:30px;height:30px;background:var(--primary);color:white;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0;margin-top:2px}
.step-done .step-num{background:var(--green)}
.step-title{font-weight:600;font-size:14px;margin-bottom:3px}
.step-desc{font-size:12px;color:var(--text2)}

/* ─── TABS ─────────────────────────────── */
.tabs{display:flex;gap:3px;background:var(--surface2);padding:4px;border-radius:10px;width:fit-content;margin-bottom:18px}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:.12s;font-family:inherit}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ─── SEARCH ─────────────────────────────── */
.search-wrap{position:relative;max-width:260px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;color:var(--text);background:var(--surface2);font-family:inherit}
.search-input:focus{outline:none;border-color:var(--primary);background:var(--surface)}
.map-wrap{width:100%;height:320px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;background:var(--surface2)}

/* ─── RESPONSIVE ─────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .page{padding:14px}
  .grid2,.grid3{grid-template-columns:1fr}
  .flow-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .mobile-menu-btn{display:grid}
  .niche-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<script>

const SUPA_URL = 'https://cumwoqyorkgikwfqnhdd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1bXdvcXlvcmtnaWt3ZnFuaGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwNDUsImV4cCI6MjA4Nzc3ODA0NX0.YpsU_ysJaoG52v7y0j-w-3vEoIlCCiPxSpZ9Qp2OeNg';

// ════════════════════════════════════════════════════════

const NICHES = [
  {id:'textile',emoji:'🧵',name:'Textile',units:['Metres','KG','Rolls']},
  {id:'pharma',emoji:'💊',name:'Pharma',units:['Strips','Boxes','Vials']},

// ════════════════════════════════════════════════════════
// DB HELPERS
// ════════════════════════════════════════════════════════
const uid = () => S.user?.id;

async function getProfile(){
  if(!uid()) return null;
  const {data} = await db.from('profiles').select('*').eq('id',uid()).single();
  return data;
}
async function saveProfile(obj){

// ════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════
function toast(msg, type='info'){
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════
function modal(html){
  closeModal();
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.innerHTML=html;
  wrap.addEventListener('click',e=>{ if(e.target===wrap) closeModal(); });
  document.getElementById('modals').appendChild(wrap);
  return wrap;
}
function closeModal(){ document.querySelector('.overlay')?.remove(); }

const fmt = n => Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
const statusBadge = s => ({
  pending:'<span class="badge badge-warning">Pending</span>',
  confirmed:'<span class="badge badge-info">Confirmed</span>',
  delivered:'<span class="badge badge-success">Delivered</span>',
  cancelled:'<span class="badge badge-danger">Cancelled</span>',
}[s]||`<span class="badge badge-neutral">${s||'—'}</span>`);

function sendWA(phone, msg){
  const n=(phone||'').replace(/\D/g,'');
  const num=n.startsWith('91')?n:'91'+n;
  if(!n){ toast('No phone number found','error'); return; }
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
}

function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('panel-login').classList.toggle('hidden', tab!=='login');

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){ toast('Please fill all fields','error'); return; }
  const btn=document.getElementById('login-btn');
  btn.innerHTML='<span class="spinner"></span> Logging in...'; btn.disabled=true;
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){ toast(error.message,'error'); btn.innerHTML='Login'; btn.disabled=false; return; }
  S.user=data.user;
  await initUser();
  render();
}

async function doRegister(){
  const biz=document.getElementById('r-biz').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!biz||!email||!pass){ toast('Please fill all fields','error'); return; }
  if(pass.length<6){ toast('Password must be at least 6 characters','error'); return; }
  const btn=document.getElementById('reg-btn');
  btn.innerHTML='<span class="spinner"></span> Creating...'; btn.disabled=true;
  const {data,error}=await db.auth.signUp({email,password:pass});
  if(error){ toast(error.message,'error'); btn.innerHTML='Create Account'; btn.disabled=false; return; }
  S.user=data.user;
  await db.from('profiles').upsert({id:data.user.id, email, business_name:biz});
  S.profile={id:data.user.id, email, business_name:biz};
  toast('Account created! Choose your business type.','success');
  render();
}

async function doGoogle(){
  const {error}=await db.auth.signInWithOAuth({
    provider:'google',
    options:{
      redirectTo: APP_URL,
      queryParams:{ access_type:'offline', prompt:'consent' }
    }
  });
  if(error) toast(error.message,'error');
}

async function createOrder(){
  const cust=document.getElementById('o-cust').value.trim();
  const prod=document.getElementById('o-prod').value.trim();
  const qty=parseFloat(document.getElementById('o-qty').value)||1;
  const rate=parseFloat(document.getElementById('o-rate').value)||0;
  const disc=parseFloat(document.getElementById('o-disc').value)||0;
  const unit=document.getElementById('o-unit').value;
  const notes=document.getElementById('o-notes').value;
  const ph=document.getElementById('o-ph').value;
  if(!cust||!prod){ toast('Customer and product are required','error'); return; }
  const sub=qty*rate;
  const total=sub-(sub*disc/100);
  const {error}=await db.from('orders').insert({user_id:uid(),customer_name:cust,customer_phone:ph,product:prod,quantity:qty,unit,price:rate,discount:disc,total,notes,status:'pending'});
  if(error){ toast(error.message,'error'); return; }
  toast('Order created! ✅','success');
  closeModal();
  await loadOrders();
  render();
}

function waOrder(id){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  const biz=S.profile?.business_name||'BizFlow';
  sendWA(o.customer_phone,`Dear ${o.customer_name},\n\nYour order is confirmed:\n📦 ${o.product} — ${o.quantity} ${o.unit||'pcs'}\n💰 Total: ₹${fmt(o.total)}\n\nThank you!\n— ${biz}`);
}

function waPayment(id){
  const p=S.payments.find(x=>x.id===id);
  if(!p) return;
  const biz=S.profile?.business_name||'BizFlow';
  const days=Math.round((new Date()-new Date(p.due_date))/86400000);
  sendWA(p.party_phone,`Dear ${p.party_name},\n\nPayment Reminder:\n💰 Amount: ₹${fmt(p.amount)}\n📅 Due: ${fmtDate(p.due_date)}\n${days>0?`⚠️ Overdue by ${days} days\n`:''}\nPlease arrange payment.\n\n— ${biz}`);
}

function waRestock(id){
  const item=S.inventory.find(x=>x.id===id);
  if(!item) return;
  const biz=S.profile?.business_name||'BizFlow';
  const sup=S.suppliers[0];
  sendWA(sup?.phone||'',`Hi,\n\nWe need to reorder:\n📦 ${item.name}\n📊 Current stock: ${item.quantity} ${item.unit||'pcs'}\n\nPlease send quotation.\n— ${biz}`);
}

function waSupplier(id){
  const s=S.suppliers.find(x=>x.id===id);
  if(!s) return;
  sendWA(s.phone,`Hello ${s.name},\n\nThis is ${S.profile?.business_name||'BizFlow'}. We would like to discuss a new order.\n\nThank you!`);
}

function genInvoice(id){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const biz=S.profile?.business_name||'My Business';
  const invNo=`INV-${Date.now().toString().slice(-6)}`;
  doc.setFontSize(18); doc.setFont(undefined,'bold');
  doc.text('TAX INVOICE',105,18,{align:'center'});
  doc.setFontSize(13); doc.text(biz,20,30);
  doc.setFont(undefined,'normal'); doc.setFontSize(9);
  doc.text(`GSTIN: ${S.profile?.gstin||'N/A'}`,20,37);
  doc.text(`PAN: ${S.profile?.pan||'N/A'}`,20,43);
  if(S.profile?.address) doc.text(S.profile.address,20,49);
  doc.text(`Invoice No: ${invNo}`,140,30);
  doc.text(`Date: ${new Date().toLocaleDateString('en-IN')}`,140,37);
  doc.setFont(undefined,'bold'); doc.text('Bill To:',20,62);
  doc.setFont(undefined,'normal');
  doc.text(o.customer_name,20,69);
  if(o.customer_phone) doc.text(`Ph: ${o.customer_phone}`,20,75);
  doc.setFillColor(240,240,240);
  doc.rect(20,83,170,7,'F');
  doc.setFont(undefined,'bold');
  doc.text('Item',22,89); doc.text('Qty',90,89); doc.text('Rate',115,89); doc.text('GST',145,89); doc.text('Total',168,89);
  doc.setFont(undefined,'normal');
  const gst=(o.total||0)*0.18;
  doc.text(o.product||'',22,101);
  doc.text(`${o.quantity} ${o.unit||''}`,90,101);
  doc.text(`₹${fmt(o.price||0)}`,115,101);
  doc.text(`₹${fmt(gst)}`,145,101);
  doc.text(`₹${fmt((o.total||0)+gst)}`,168,101);
  doc.line(20,107,190,107);
  doc.setFont(undefined,'bold');
  doc.text('Grand Total:',130,114);
  doc.text(`₹${fmt((o.total||0)+gst)}`,168,114);
  doc.setFont(undefined,'normal'); doc.setFontSize(8);
  doc.text('Thank you for your business! — Generated by BizFlow',105,130,{align:'center'});
  doc.save(`Invoice_${o.customer_name}_${invNo}.pdf`);
  toast('GST Invoice downloaded! ✅','success');
}

function filterPay(type,btn){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));

  document.querySelectorAll('#pay-tb tbody tr').forEach(r=>{
    if(type==='all') r.style.display='';
    else if(type==='overdue') r.style.display=r.textContent.includes('Overdue')?'':'none';
    else r.style.display=r.textContent.toLowerCase().includes(type)?'':'none';
  });
}

async function initUser(){
  S.profile=await getProfile();
  if(!S.profile){
    await db.from('profiles').upsert({id:uid(),email:S.user?.email});
    S.profile={id:uid(),email:S.user?.email};
  }
  await loadAll();
}

async function init(){
  // Handle OAuth callback hash
  const hash=window.location.hash;
  if(hash && hash.includes('access_token')){
    const {data:{session},error}=await db.auth.getSession();
    if(session){ S.user=session.user; await initUser(); window.history.replaceState({},document.title,window.location.pathname); render(); return; }
  }
  const {data:{session}}=await db.auth.getSession();
  if(session?.user){ S.user=session.user; await initUser(); }
  render();
  db.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){
      S.user=session.user;
      await initUser();
      render();
    } else if(event==='SIGNED_OUT'){
      S.user=null; S.profile=null; render();
    }
  });
}

init();
